obstacle_avoidance_node:
  ros__parameters:
    safety_distance: 0.25
    max_speed: 0.3
    turn_speed: 0.5

motion_controller_node:
  ros__parameters:
    target_position_tolerance: 0.3
    max_speed: 0.5
    max_angular_speed: 1.0
    kp_linear: 0.5
    kp_angular: 1.0

path_planner_node:
  ros__parameters:
    point_p: [0.0, 0.0]
    task_point: [5.0, 2.0]
    channel_entry: [5.0, 2.25]
    c_channel_start: [5.0, 2.5]
    c_channel_end: [5.0, 5.0]
